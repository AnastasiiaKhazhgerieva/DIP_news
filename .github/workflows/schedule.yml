name: Scheduled DIP News

on:
  schedule:
    # Среда в 16:00 MSK → 13:00 UTC
    - cron: '0 13 * * Wed'
    # Пятница в 10:30 MSK → 7:30 UTC
    - cron: '30 7 * * Fri'
    # В остальные дни (понедельник, вторник, четверг, суббота, воскресенье) в 14:00 MSK → 11:00 UTC
    - cron: '0 11 * * Mon,Tue,Thu,Sat,Sun'
    # Вторник в 03:53 MSK → 00:53 UTC
    - cron: '53 0 * * 2'
  workflow_dispatch: {}

jobs:
  run-dip-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run dip_news.py
        env:
          #GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          #PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FOLDERS_SANDBOX: ${{ secrets.FOLDERS_SANDBOX}}
          FOLDERS_MAIN: ${{ secrets.FOLDERS_MAIN}}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN}}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID}}
          PROXY: ${{ secrets.PROXY}}
        run: python dip_news.py

  ingest-gmail-final:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch Gmail & save final.txt
        # Не требует pip install, fetch_gmail.py использует только стандартные библиотеки Python
        env:
          gmail_imap_host: ${{ secrets.gmail_imap_host }}
          gmail_imap_port: ${{ secrets.gmail_imap_port }}
          gmail_user: ${{ secrets.gmail_user }}
          gmail_password: ${{ secrets.gmail_password }}
        run: python fetch_gmail.py

      - name: Commit & push final versions
        run: |
          git config user.name "email-bot"
          git config user.email "archive-bot@githubactions.local"
          git add final_versions/
          # Коммитим только если есть новые файлы
          git diff --cached --quiet || git commit -m "📩 Ingested final versions from email ($(date +%Y-%m-%d))"
          git pull --rebase origin main
          git push origin main
